name: Build Xposed Module APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      # =====================================================
      # 1. 环境准备
      # =====================================================
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # =====================================================
      # 2. 安装Android SDK
      # =====================================================
      - name: 安装Android SDK命令行工具
        run: |
          # 使用与 Runner 预装 SDK 相同的路径，避免 ANDROID_HOME 与 ANDROID_SDK_ROOT 冲突
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools

          # 下载最新版命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip

          # 安装到指定位置
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ || true

          # 设置环境变量（同时设置 ANDROID_HOME 和 ANDROID_SDK_ROOT 为相同路径）
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: 接受Android SDK许可证
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager --update

      - name: 安装Android SDK组件
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest"

      # =====================================================
      # 3. 准备Gradle Wrapper
      # =====================================================
      - name: 确保Gradle Wrapper存在
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar 缺失或为空，正在生成..."
            gradle wrapper --gradle-version 8.1 --no-daemon
          fi
          chmod +x gradlew

      # =====================================================
      # 4. 编译APK
      # =====================================================
      - name: 编译Release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace 2>&1 | tee build.log
          grep -E "(FAILURE|BUILD|What went wrong|Caused by|Execution failed|> Could not|> Failed|> java\.lang|> org\.gradle)" build.log | tail -50 || true

      - name: 查找编译产物
        run: |
          find . -name "*.apk" -type f
          ls -lah app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"

      # =====================================================
      # 5. 签名APK (使用debug key)
      # =====================================================
      - name: 生成Debug签名密钥
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: 找到未签名的APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi

      - name: 签名并对齐APK
        if: steps.find_apk.outputs.apk_path != ''
        run: |
          UNSIGNED_APK="${{ steps.find_apk.outputs.apk_path }}"
          echo "Signing: $UNSIGNED_APK"

          # 先对齐
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$UNSIGNED_APK" ETingshuoVipHook-aligned.apk

          # 再签名
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out ETingshuoVipHook-final.apk \
            ETingshuoVipHook-aligned.apk

          # 验证签名
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify ETingshuoVipHook-final.apk

          ls -lh ETingshuoVipHook-final.apk

      # =====================================================
      # 6. 上传Artifact
      # =====================================================
      - name: 上传APK (Release/未签名)
        uses: actions/upload-artifact@v4
        with:
          name: ETingshuoVipHook-unsigned
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/unsigned/*.apk
          retention-days: 30

      - name: 上传APK (已签名)
        if: hashFiles('ETingshuoVipHook-final.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ETingshuoVipHook-signed
          path: ETingshuoVipHook-final.apk
          retention-days: 30

      # =====================================================
      # 7. 创建Release (可选)
      # =====================================================
      - name: 创建Release (仅main分支)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## E听说中学 VIP Hook 模块

            ### 安装方式
            - **LSPosed (Root)**: 直接安装APK → 在LSPosed中勾选 `com.ets100.secondary`
            - **NPatch (免Root)**: 使用NPatch修补目标应用后嵌入本模块

            ### 版本信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}

            ### 下载
            - [ETingshuoVipHook-final.apk](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/ETingshuoVipHook-final.apk)
          files: |
            ETingshuoVipHook-final.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
